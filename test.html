                    <legend>大坳門介紹</legend>
                    <span>大坳門（Tai Au Mun）位於香港新界西貢區清水灣半島南部，
                        是清水灣道與大坳門路交匯處的著名休閒地點，以大坑墩風箏場、燒烤場及龍蝦灣郊遊徑聞名。
                        該處擁有大片草地，是野餐、放風箏、遙控模型飛機和觀星的熱門勝地，視野開闊，風景優美。
                    </span>
                </fieldset>
